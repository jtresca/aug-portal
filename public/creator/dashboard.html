<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard - AUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
            padding: 40px;
        }
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #00a6ff;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-card {
            background: rgba(255,255,255,0.05);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
        }
        button {
            background: #00a6ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }
        .revenue-info {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Creator Dashboard</h1>
            <a href="/" style="color: #94a3b8; text-decoration: none;">&larr; Back to Portal</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-gross">$0.00</div>
                <div class="stat-label">Total Gross</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-share">$0.00</div>
                <div class="stat-label">Creator Share (90%)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-plays">0</div>
                <div class="stat-label">Total Plays</div>
            </div>
        </div>

        <div class="form-card">
            <h2>Add New Game</h2>
            <form id="game-form">
                <div class="input-group">
                    <label>Game Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="input-group">
                    <label>Slug (URL Identifier)</label>
                    <input type="text" id="slug" required>
                </div>
                <div class="input-group">
                    <label>Thumbnail URL</label>
                    <input type="url" id="thumbnail" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <button type="submit">Submit for Review</button>
            </form>
            <div class="revenue-info">
                <strong>Platform Policy:</strong> AUG takes a 10% platform fee. You keep 90% of all IAP and ad revenue generated by your titles.
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch('/api/creator/revenue');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('stat-gross').textContent = `$${parseFloat(data.total_gross).toFixed(2)}`;
                document.getElementById('stat-share').textContent = `$${parseFloat(data.creator_share).toFixed(2)}`;
                document.getElementById('stat-plays').textContent = data.total_transactions; // Using transaction count as mock proxy
            }
        }

        document.getElementById('game-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value,
                thumbnail_url: document.getElementById('thumbnail').value,
                description: document.getElementById('description').value
            };

            const res = await fetch('/api/games/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Success! Game submitted for review.');
                e.target.reset();
            } else {
                alert('Submission failed. Slugs must be unique.');
            }
        });

        loadStats();
    </script>
</body>
</html>
