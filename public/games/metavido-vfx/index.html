<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MetavidoVFX - Unity WebGPU VFX Graph Sample</title>
    <link rel="stylesheet" href="simple.min.css">
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: block !important;
      }
      #unity-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #unity-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-loading">Loading...</div>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script src="Build/MetavidoVFX.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loading = document.getElementById("unity-loading");
      function Progress(value) {
        loading.innerHTML = "Loading... " + Math.round(value * 100) + "%";
        if (value === 1) loading.style.display = "none";
      }
      const urlParams = new URLSearchParams(window.location.search);
      const sourceUrl = urlParams.get("source");
      var args = sourceUrl ? ["--sourceURL", sourceUrl] : [];
      // Default to lite mode if not specified, or if lite is true
      if (urlParams.get("lite") !== "false") args.push("--lite");
      
      var config = {
        arguments: args,
        dataUrl: "Build/MetavidoVFX.data.unityweb",
        frameworkUrl: "Build/MetavidoVFX.framework.js.unityweb",
        codeUrl: "Build/MetavidoVFX.wasm.unityweb",
        companyName: "DefaultCompany",
        productName: "MetavidoVFX",
        productVersion: "0.1"
      };
      createUnityInstance(canvas, config, Progress).then((unityInstance) => {
        window.unityInstance = unityInstance;
      });

      window.addEventListener('mousedown', function() {
        canvas.focus();
      });
    </script>
  </body>
</html>
